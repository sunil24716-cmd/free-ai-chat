steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/free-ai-chat:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/free-ai-chat:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/free-ai-chat']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - free-ai-chat
      - --image=gcr.io/$PROJECT_ID/free-ai-chat:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --port=8080
      - --set-env-vars=NODE_ENV=production
      # API keys come from Secret Manager — set after deploy:
      # gcloud run services update free-ai-chat --region us-central1
      #   --set-secrets="GROQ_API_KEY=groq-key:latest,GEMINI_API_KEY=gemini-key:latest"
images:
  - 'gcr.io/$PROJECT_ID/free-ai-chat:latest'
options:
  logging: CLOUD_LOGGING_ONLY
